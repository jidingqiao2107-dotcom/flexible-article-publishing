services:
  postgres-test:
    image: postgres:16-alpine
    container_name: route-a-authoring-postgres-test
    environment:
      POSTGRES_USER: route_a
      POSTGRES_PASSWORD: route_a_password
      POSTGRES_DB: route_a_authoring_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U route_a -d route_a_authoring_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

